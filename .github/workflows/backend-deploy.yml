name: Build & Deploy Backend to Azure Container Apps

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "prisma/**"
      - "Dockerfile"
      - "docker-entrypoint.sh"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - ".github/workflows/backend-deploy.yml"

permissions:
  id-token: write
  contents: read

jobs:
  build_push_deploy:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: imlocl-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker login to ACR
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set image tag
        run: |
          IMAGE="${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV
          echo "Using image: $IMAGE"

      - name: Build Docker image
        run: |
          docker build -t "$IMAGE" .

      - name: Push Docker image
        run: |
          docker push "$IMAGE"

      - name: Set Container App secrets
        run: |
          az containerapp secret set \
            --name "${{ secrets.CONTAINER_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --secrets \
              database-url='${{ secrets.DATABASE_URL }}' \
              azure-storage-connstr='DefaultEndpointsProtocol=https;AccountName=imlocldev;AccountKey=${{ secrets.AZURE_STORAGE_ACCOUNT_KEY }};EndpointSuffix=core.windows.net' \
              google-maps-api-key='${{ secrets.GOOGLE_MAPS_API_KEY }}' \
              twilio-account-sid='${{ secrets.TWILIO_ACCOUNT_SID }}' \
              twilio-auth-token='${{ secrets.TWILIO_AUTH_TOKEN }}' \
              twilio-verify-service-sid='${{ secrets.TWILIO_VERIFY_SERVICE_SID }}'

      - name: Run Prisma migrations using built image
        run: |
          docker run --rm \
            -e DATABASE_URL='${{ secrets.DATABASE_URL }}' \
            "$IMAGE" \
            npx prisma migrate deploy

      - name: Deploy image to Azure Container App
        run: |
          az containerapp update \
            --name "${{ secrets.CONTAINER_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --image "$IMAGE" \
            --set-env-vars \
              DATABASE_URL=secretref:database-url \
              AZURE_STORAGE_CONNECTION_STRING=secretref:azure-storage-connstr \
              GOOGLE_MAPS_API_KEY=secretref:google-maps-api-key \
              TWILIO_ACCOUNT_SID=secretref:twilio-account-sid \
              TWILIO_AUTH_TOKEN=secretref:twilio-auth-token \
              TWILIO_VERIFY_SERVICE_SID=secretref:twilio-verify-service-sid \
              AZURE_STORAGE_CONTAINER_NAME=images \
              AZURE_STORAGE_ACCOUNT_NAME=imlocldev \
              NODE_ENV=production \
              PORT=8080

      - name: Verify environment variables in Container App
        run: |
          az containerapp show \
            --name "${{ secrets.CONTAINER_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --query "properties.template.containers[0].env" \
            -o table

      - name: Wait briefly for revision startup
        run: sleep 20

      - name: Show latest revision details
        run: |
          az containerapp revision list \
            --name "${{ secrets.CONTAINER_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            -o table

      - name: Show active image
        run: |
          az containerapp show \
            --name "${{ secrets.CONTAINER_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --query "properties.template.containers[0].image" \
            -o tsv

      - name: Check app health endpoint
        run: |
          APP_FQDN=$(az containerapp show \
            --name "${{ secrets.CONTAINER_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --query "properties.configuration.ingress.fqdn" \
            -o tsv)

          echo "Checking https://$APP_FQDN/api/health"
          curl -i --max-time 30 "https://$APP_FQDN/api/health"
