name: Build & Deploy Backend to Azure Container Apps

on:
  push:
    branches: [ "main" ]
    paths:
      - "src/**"
      - "prisma/**"
      - "Dockerfile"
      - "docker-entrypoint.sh"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/backend-deploy.yml"

permissions:
  id-token: write
  contents: read

jobs:
  build_push_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Docker login to ACR
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push image
        run: |
          IMAGE="${{ secrets.ACR_LOGIN_SERVER }}/imlocl-backend:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Set Container App secrets
        run: |
          az containerapp secret set \
            --name ${{ secrets.CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --secrets \
              database-url='${{ secrets.DATABASE_URL }}' \
              azure-storage-connstr='DefaultEndpointsProtocol=https;AccountName=imlocldev;AccountKey=${{ secrets.AZURE_STORAGE_ACCOUNT_KEY }};EndpointSuffix=core.windows.net'

      - name: Deploy to Azure Container App
        run: |
          az containerapp update \
            --name ${{ secrets.CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.IMAGE }} \
            --set-env-vars \
              DATABASE_URL=secretref:database-url \
              AZURE_STORAGE_CONNECTION_STRING=secretref:azure-storage-connstr \
              AZURE_STORAGE_CONTAINER_NAME=images \
              AZURE_STORAGE_ACCOUNT_NAME=imlocldev \
              NODE_ENV=production \
              PORT=8080

      - name: Show revision status
        run: |
          az containerapp revision list \
            --name ${{ secrets.CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            -o table
